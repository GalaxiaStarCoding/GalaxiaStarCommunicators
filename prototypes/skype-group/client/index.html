<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Skype-style Group — GalaxiaStar Communicators Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container skype">
    <header>
      <h1>Skype-style Group Demo</h1>
    </header>
    <main>
      <div class="controls">
        <input id="roomId" placeholder="room name" value="skype-room" />
        <button id="joinBtn">Join</button>
        <button id="hangupBtn" disabled>Hang Up</button>
      </div>
      <div id="grid" class="grid"></div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
