<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Accessibility demo — Galaxia Star Communicators</title>
  <link rel="stylesheet" href="../styles/visually-hidden.css">
  <link rel="stylesheet" href="../styles/focus.css">
  <style>
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial; padding: 24px; }
    .call-toolbar { display:flex; gap:10px; align-items:center; }
    .call-toolbar button { padding:8px 12px; border:1px solid #ccc; background:#fff; border-radius:6px; }
    .call-toolbar button[aria-pressed="true"] { background:#eee; }
    .demo-area { margin-top:24px; }
    #modal { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); background:#fff; border:1px solid #ccc; padding:20px; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.2); }
    #modal.hidden { display:none; }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <div id="live-region" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <h1>Accessibility demo: Call toolbar</h1>

  <div role="toolbar" aria-label="Call controls" class="call-toolbar" id="call-toolbar">
    <button id="invite" aria-label="Invite people">Invite</button>
    <button id="record" aria-label="Start recording" aria-pressed="false">Record</button>
    <button id="participants" aria-label="Show participants" aria-haspopup="dialog">Participants</button>
    <button id="captions" aria-label="Turn captions on" aria-pressed="false">Captions</button>
    <button id="mute" aria-label="Mute microphone" aria-pressed="false">Mute</button>
    <button id="camera" aria-label="Turn camera off" aria-pressed="false">Camera</button>
    <button id="hangup" aria-label="End call">End call</button>
    <button id="chat" aria-label="Open chat">Chat</button>
    <button id="share" aria-label="Share screen">Share</button>
    <button id="raise" aria-label="Raise hand" aria-pressed="false">Raise hand</button>
    <button id="react" aria-label="React">React</button>
    <button id="more" aria-label="More options" aria-haspopup="menu">More</button>
  </div>

  <div class="demo-area">
    <p>Use the toolbar above. Buttons toggle aria-pressed where appropriate and announce state changes via the live-region.</p>
    <button id="simulate-msg">Simulate incoming message</button>
    <button id="open-modal">Open participants modal</button>
  </div>

  <div id="modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <h2 id="modal-title">Participants</h2>
    <p>Participant list (demo)</p>
    <button id="close-modal">Close</button>
  </div>

  <script src="../js/announce.js"></script>
  <script src="../js/focus-trap.js"></script>
  <script>
    // Wire up toggles to announce and set aria-pressed
    function wireToggle(id, onText, offText) {
      var btn = document.getElementById(id);
      if (!btn) return;
      btn.addEventListener('click', function() { window.toggleButtonState(btn, onText, offText); });
    }

    wireToggle('record', 'Recording started', 'Recording stopped');
    wireToggle('captions', 'Captions turned on', 'Captions turned off');
    wireToggle('mute', 'Microphone muted', 'Microphone unmuted');
    wireToggle('camera', 'Camera turned off', 'Camera turned on');
    wireToggle('raise', 'Hand raised', 'Hand lowered');

    document.getElementById('simulate-msg').addEventListener('click', function() {
      window.announceForScreenReader('New message from Alice: Hey, are you there?', 'polite');
    });

    // Modal open/close with focus trap
    var modal = document.getElementById('modal');
    var untrap = null;
    document.getElementById('open-modal').addEventListener('click', function() {
      modal.classList.remove('hidden');
      untrap = window.trapFocus(modal);
      window.announceForScreenReader('Participants dialog opened', 'polite');
    });
    document.getElementById('close-modal').addEventListener('click', function() {
      modal.classList.add('hidden');
      if (untrap) { untrap(); untrap = null; }
      document.getElementById('participants').focus();
      window.announceForScreenReader('Participants dialog closed', 'polite');
    });
    modal.addEventListener('request-close', function() {
      document.getElementById('close-modal').click();
    });
  </script>
</body>
</html>
