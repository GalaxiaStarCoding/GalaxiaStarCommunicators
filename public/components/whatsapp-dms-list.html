<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WhatsApp-style DMs List (component)</title>
  <style>
    :root{
      --bg:#ffffff; --muted:#6b6f76; --accent:#25D366;
    }
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; background:var(--bg); margin:0; padding:16px;}
    .dm-list{width:360px;border-radius:8px;border:1px solid #e6e6e6;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .dm-item{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #f2f2f2;cursor:pointer;background:#fff}
    .dm-item:hover{background:#fafafa}
    .avatar{width:48px;height:48px;border-radius:50%;flex:0 0 48px;background:#ddd;display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff}
    .dm-info{flex:1;margin-left:12px;min-width:0}
    .dm-top{display:flex;justify-content:space-between;align-items:center}
    .name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .time{font-size:12px;color:var(--muted);margin-left:8px;flex:0 0 auto}
    .dm-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
    .preview{color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
    .badge{background:var(--accent);color:#fff;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700}
    /* small helper for offline/online */
    .status{width:10px;height:10px;border-radius:50%;margin-left:6px}
    .online{background:#2ecc71}
    .offline{background:#bdbdbd}
  </style>
</head>
<body>
  <div class="dm-list" role="list" aria-label="Direct messages">
    <div class="dm-item" role="listitem">
      <div class="avatar" style="background:#2d9cdb">JS</div>
      <div class="dm-info">
        <div class="dm-top">
          <div class="name">Jordan Skywalker</div>
          <div class="time">12:45</div>
        </div>
        <div class="dm-bottom">
          <div class="preview">Hey — are we still on for tonight?</div>
          <div class="badge">3</div>
        </div>
      </div>
    </div>

    <div class="dm-item" role="listitem">
      <div class="avatar" style="background:#ff8a65">MK</div>
      <div class="dm-info">
        <div class="dm-top">
          <div class="name">Mira K.</div>
          <div class="time">09:10</div>
        </div>
        <div class="dm-bottom">
          <div class="preview">Sent a photo</div>
          <div style="display:flex;align-items:center">
            <div class="status online" title="online"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Add more .dm-item blocks or render them dynamically -->
  </div>
</body>
</html>
