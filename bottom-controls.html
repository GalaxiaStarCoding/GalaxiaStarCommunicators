<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bottom Controls - GalaxiaStarCommunicators</title>
  <link rel="stylesheet" href="bottom-controls.css" />
</head>
<body>
  <div class="bottom-bar" role="region" aria-label="Audio and user controls">
    <div class="left-controls">
      <div class="slider-row">
        <label class="sr-only" for="mic-slider">Microphone volume</label>
        <input id="mic-slider" class="slider" type="range" min="0" max="100" value="65" />
        <div class="mic-indicator" aria-hidden="true" id="mic-indicator" title="Mic activity">
          <!-- bars generated by JS -->
        </div>
      </div>

      <div class="slider-row">
        <label class="sr-only" for="spk-slider">Speaker volume</label>
        <input id="spk-slider" class="slider" type="range" min="0" max="100" value="40" />
      </div>

      <div class="rx-tx">RX: 18.46KB TX: 0.50KB</div>
    </div>

    <div class="right-controls" aria-label="User controls">
      <div class="profile">
        <img src="https://placehold.co/40x40/5EEAD4/0F172A?text=GS" alt="GalaxiaStar avatar" class="avatar" />
        <div class="profile-text">
          <div class="name">GalaxiaStar</div>
          <div class="tag">#GalaxiaStar</div>
        </div>
      </div>

      <div class="action-buttons" role="toolbar" aria-label="Communication actions">
        <button id="btn-mute" class="btn icon-btn" aria-pressed="false" title="Mute / Unmute">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 3v10l4 4V3z"/></svg>
        </button>

        <button id="btn-deafen" class="btn icon-btn" aria-pressed="false" title="Deafen / Undeafen">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
        </button>

        <!-- This button toggles real microphone input -->
        <button id="btn-voice" class="btn icon-btn" aria-pressed="false" title="Enable microphone">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 3a3 3 0 00-3 3v6a3 3 0 006 0V6a3 3 0 00-3-3zM5 11a7 7 0 0014 0h-2a5 5 0 01-10 0H5z"/></svg>
        </button>

        <button id="btn-settings" class="btn icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="bottom-controls.js"></script>
</body>
</html>
