<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Galaxia Star Communicators — Top Server Bar Demo</title>
  <link rel="stylesheet" href="css/server-top.css">
  <style>
    /* Inline styles for the Server Connect UI (quick prototype) */
    .server-connect-btn{
      margin-left:12px;
      padding:6px 10px;
      border-radius:6px;
      border:none;
      background:#2b6ef6;
      color:white;
      font-weight:600;
      cursor:pointer;
    }
    .modal{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,0.4);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease;
      z-index:9999;
    }
    .modal[aria-hidden="false"]{opacity:1;pointer-events:auto}
    .modal-content{
      background:#fff;
      padding:18px;
      width:320px;
      max-width:92%;
      border-radius:8px;
      box-shadow:0 6px 24px rgba(0,0,0,0.2);
      font-family:system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;
    }
    .modal-content h2{margin:0 0 10px;font-size:18px}
    .modal-content label{display:block;margin:8px 0;font-size:13px}
    .modal-content input[type=text], .modal-content input[type=password], .modal-content input[type=number]{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
    .btn{padding:8px 12px;border-radius:6px;border:1px solid #ccc;background:#f6f6f6;cursor:pointer}
    .btn.primary{background:#2b6ef6;color:#fff;border-color:#2b6ef6}
    #connectStatus{margin-top:8px;font-size:13px;color:#333}
  </style>
</head>
<body>
  <header class="server-bar" role="navigation" aria-label="Server list">
    <ul class="servers" role="list">
      <li class="server" tabindex="0" data-name="Home">
        <div class="server-icon active" aria-hidden="true">GS</div>
        <span class="badge">3</span>
      </li>
      <li class="server" tabindex="0" data-name="Friends">
        <div class="server-icon" aria-hidden="true">F</div>
      </li>
      <li class="server" tabindex="0" data-name="Work">
        <div class="server-icon" aria-hidden="true">W</div>
        <span class="badge dot"></span>
      </li>
      <li class="server" tabindex="0" data-name="Gaming">
        <div class="server-icon" aria-hidden="true">G</div>
      </li>
      <li class="server" tabindex="0" data-name="Study">
        <div class="server-icon" aria-hidden="true">S</div>
      </li>
      <li class="server" tabindex="0" data-name="Meetings">
        <div class="server-icon" aria-hidden="true">M</div>
      </li>
      <!-- Add more servers as needed -->
    </ul>
    <!-- Quick Connect button to open server entry modal -->
    <button id="openServerBtn" class="server-connect-btn" aria-haspopup="dialog">Connect to server</button>
  </header>

  <main class="app-content">
    <section class="hero">
      <h1>Top Server List Demo</h1>
      <p>This demo shows a Discord-style server list positioned at the top of the app instead of the left side.</p>
      <p>Click or tab+enter on the circles to activate a server. Resize to see horizontal scrolling behavior.</p>
    </section>
  </main>

  <div id="tooltip" class="tooltip" aria-hidden="true"></div>

  <!-- Server connection modal (prototype) -->
  <div id="serverModal" class="modal" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-labelledby="serverModalLabel">
      <h2 id="serverModalLabel">Connect to Server</h2>
      <form id="serverForm">
        <label>
          Server address
          <input id="serverAddress" type="text" placeholder="example.com or 192.0.2.1" required />
        </label>
        <label>
          Port
          <input id="serverPort" type="number" value="10333" required />
        </label>
        <label>
          Username
          <input id="serverUser" type="text" placeholder="username" required />
        </label>
        <label>
          Password
          <input id="serverPass" type="password" placeholder="optional" />
        </label>
        <label style="display:flex;align-items:center;gap:8px;margin-top:6px">
          <input id="serverTls" type="checkbox" /> Use TLS / Secure
        </label>
        <div class="modal-actions">
          <button type="button" id="cancelBtn" class="btn">Cancel</button>
          <button type="submit" class="btn primary">Connect</button>
        </div>
        <div id="connectStatus" role="status" aria-live="polite"></div>
      </form>
    </div>
  </div>

  <script>
    // Simple interaction: toggle active state; show tooltip on hover/focus
    document.addEventListener('DOMContentLoaded', () => {
      const servers = document.querySelectorAll('.server');
      const tooltip = document.getElementById('tooltip');

      servers.forEach(s => {
        const icon = s.querySelector('.server-icon');
        const name = s.dataset.name || 'Server';

        const activate = () => {
          document.querySelectorAll('.server-icon').forEach(i => i.classList.remove('active'));
          icon.classList.add('active');
        };

        s.addEventListener('click', activate);
        s.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            activate();
          }
        });

        s.addEventListener('mouseenter', (e) => {
          tooltip.textContent = name;
          tooltip.style.opacity = '1';
          const rect = s.getBoundingClientRect();
          tooltip.style.left = rect.left + window.scrollX + 'px';
          tooltip.style.top = (rect.bottom + 8) + window.scrollY + 'px';
          tooltip.setAttribute('aria-hidden', 'false');
        });
        s.addEventListener('mouseleave', () => {
          tooltip.style.opacity = '0';
          tooltip.setAttribute('aria-hidden', 'true');
        });

        s.addEventListener('focus', (e) => {
          tooltip.textContent = name;
          tooltip.style.opacity = '1';
          const rect = s.getBoundingClientRect();
          tooltip.style.left = rect.left + window.scrollX + 'px';
          tooltip.style.top = (rect.bottom + 8) + window.scrollY + 'px';
          tooltip.setAttribute('aria-hidden', 'false');
        });
        s.addEventListener('blur', () => {
          tooltip.style.opacity = '0';
          tooltip.setAttribute('aria-hidden', 'true');
        });
      });

      // Allow horizontal scrolling with mouse wheel when hovered
      const serversList = document.querySelector('.servers');
      serversList.addEventListener('wheel', (e) => {
        if (Math.abs(e.deltaX) < Math.abs(e.deltaY)) {
          serversList.scrollLeft += e.deltaY;
          e.preventDefault();
        }
      }, { passive: false });

      // --- Server modal logic ---
      const openBtn = document.getElementById('openServerBtn');
      const modal = document.getElementById('serverModal');
      const cancelBtn = document.getElementById('cancelBtn');
      const form = document.getElementById('serverForm');
      const status = document.getElementById('connectStatus');

      const focusableSelector = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';

      function openModal(){
        // populate from localStorage if present
        const saved = JSON.parse(localStorage.getItem('gsc_server') || '{}');
        if(saved.address) document.getElementById('serverAddress').value = saved.address;
        if(saved.port) document.getElementById('serverPort').value = saved.port;
        if(saved.user) document.getElementById('serverUser').value = saved.user;
        if(saved.tls) document.getElementById('serverTls').checked = saved.tls;

        modal.setAttribute('aria-hidden','false');
        // trap focus
        const focusable = modal.querySelectorAll(focusableSelector);
        if(focusable.length) focusable[0].focus();
      }

      function closeModal(){
        modal.setAttribute('aria-hidden','true');
        status.textContent = '';
        openBtn.focus();
      }

      openBtn.addEventListener('click', openModal);
      cancelBtn.addEventListener('click', closeModal);

      modal.addEventListener('click', (e) => {
        if(e.target === modal) closeModal();
      });

      // handle submit: store settings and simulate a connect attempt
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const address = document.getElementById('serverAddress').value.trim();
        const port = document.getElementById('serverPort').value.trim();
        const user = document.getElementById('serverUser').value.trim();
        const pass = document.getElementById('serverPass').value;
        const tls = document.getElementById('serverTls').checked;

        if(!address || !port || !user){
          status.textContent = 'Please fill address, port and username.';
          return;
        }

        const cfg = {address,port,user,tls};
        localStorage.setItem('gsc_server', JSON.stringify(cfg));

        status.textContent = 'Connecting...';

        // Simulate a connection attempt. Replace this with real network code later.
        setTimeout(() => {
          // simple success/failure heuristic: if address contains "http" or "example" fail, otherwise succeed.
          if(address.includes('example') || address.includes('http')){
            status.textContent = 'Connection failed: unreachable or invalid address.';
            status.style.color = 'crimson';
          } else {
            status.textContent = `Connected to ${address}:${port} as ${user}`;
            status.style.color = 'green';
            // close modal shortly after success
            setTimeout(closeModal, 900);
          }
        }, 900);
      });

      // allow opening modal via keyboard: focus on openBtn
      openBtn.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' || e.key === ' ') openModal();
      });

      // Accessibility: close on Escape
      document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape' && modal.getAttribute('aria-hidden') === 'false') closeModal();
      });

    });
  </script>
</body>
</html>
