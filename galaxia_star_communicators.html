<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galaxia Star Communicators</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  font-family: system-ui;
  background: #0f0f12;
  color: white;
}

.servers {
  width: 72px;
  background: #1c1d22;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 12px;
  gap: 12px;
}

.server {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #5865F2;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.chats {
  width: 260px;
  background: #2a2b31;
  padding: 10px;
}

.chatItem {
  padding: 12px;
  margin-bottom: 8px;
  background: #3a3c44;
  border-radius: 10px;
  cursor: pointer;
}

.chatArea {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #111216;
}

.header {
  height: 50px;
  background: #1b1c20;
  display: flex;
  align-items: center;
  padding: 0 15px;
  font-weight: bold;
}

.messages {
  flex: 1;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
}

.bubble {
  max-width: 65%;
  padding: 10px 14px;
  border-radius: 18px;
}

.me {
  background: #0b93f6;
  align-self: flex-end;
}

.them {
  background: #2a2b31;
  align-self: flex-start;
}

.inputBar {
  display: flex;
  padding: 10px;
  background: #1b1c20;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 10px 14px;
  border-radius: 20px;
  border: none;
  background: #5865F2;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="servers">
  <div class="server" onclick="switchServer('Home')">H</div>
  <div class="server" onclick="switchServer('Gaming')">G</div>
  <div class="server" onclick="switchServer('School')">S</div>
</div>

<div class="chats" id="chatList"></div>

<div class="chatArea">

  <div class="header" id="header">Chat</div>

  <div class="messages" id="messages"></div>

  <div class="inputBar">
    <input id="input" placeholder="Message..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
let currentServer = "Home";
let currentChat = null;

const data = {
  Home: { Mario: [], Sonic: [] },
  Gaming: { Fortnite: [], Minecraft: [] },
  School: { Math: [], Science: [] }
};

function switchServer(server) {
  currentServer = server;
  renderChats();
  clearMessages();
}

function renderChats() {
  const chatList = document.getElementById("chatList");
  chatList.innerHTML = "";

  Object.keys(data[currentServer]).forEach(chat => {
    const div = document.createElement("div");
    div.className = "chatItem";
    div.innerText = chat;
    div.onclick = () => openChat(chat);
    chatList.appendChild(div);
  });
}

function openChat(chat) {
  currentChat = chat;
  document.getElementById("header").innerText = chat;
  renderMessages();
}

function renderMessages() {
  const box = document.getElementById("messages");
  box.innerHTML = "";

  const messages = data[currentServer][currentChat];

  messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "bubble " + m.type;
    div.innerText = m.text;
    box.appendChild(div);
  });
}

function send() {
  const input = document.getElementById("input");
  if (!currentChat) return;

  data[currentServer][currentChat].push({
    text: input.value,
    type: "me"
  });

  renderMessages();
  input.value = "";
}

function clearMessages() {
  document.getElementById("messages").innerHTML = "";
  document.getElementById("header").innerText = "Chat";
  currentChat = null;
}

switchServer("Home");
renderChats();
</script>

</body>
</html>
